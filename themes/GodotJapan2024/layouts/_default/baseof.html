<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}" dir="{{ or .Site.Language.Direction `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="base-background-color">
  <header class="sticky-top m-0">
    {{ partial "header.html" . }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="footer w-100">
    {{ partial "footer.html" . }}
  </footer>
</body>
</html>
